# Thresholds & alerting config for status-page.
# Severity: ok < warn < crit
# "alert" entries are consumed by future email-alerter (not active yet in v2).

host:
  cpu_percent:
    warn: 70
    crit: 90
  ram_percent:
    warn: 80
    crit: 95
  disk_percent:
    warn: 80
    crit: 92
  swap_percent:
    warn: 40
    crit: 75
  load_per_core:        # load1 / cpu_count
    warn: 1.5
    crit: 3.0
  network_rx_mb_s:
    warn: 80
    crit: 120
  network_tx_mb_s:
    warn: 80
    crit: 120

timesync:
  offset_ms_abs:
    warn: 200
    crit: 1000
  max_sync_age_minutes:
    warn: 60
    crit: 240

fail2ban:
  currently_banned:
    warn: 5
    crit: 20
  recent_bans_24h:
    warn: 10
    crit: 50

docker:
  unhealthy_containers:
    warn: 1
    crit: 2
  expected_min_running: 5

n8n:
  latency_ms:
    warn: 1500
    crit: 5000

# Alerting via Telegram bot
# Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID as environment variables in Coolify.
# cooldown_minutes: minimum gap between repeat alerts for the same metric.
alerts:
  cooldown_minutes: 15
