services:

  # --- Host metrics (CPU/RAM/Net/FS/Timex) ---
  # Runs in-stack so Prometheus (internal network) can scrape it
  # without exposing port 9100 on the public interface.
  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: status-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --web.listen-address=0.0.0.0:9100
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    labels:
      - "traefik.enable=false"
      - "coolify.managed=true"

  # --- Read-only Docker socket proxy ---
  # Only GET endpoints for listing containers/images are enabled.
  # The status-page queries this to get container list and health.
  # The public status-page container NEVER touches /var/run/docker.sock.
  dockerproxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: status-dockerproxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      PING: 1
      VERSION: 1
      NETWORKS: 1
      POST: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EVENTS: 0
      EXEC: 0
      GRPC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "2375"
    labels:
      - "traefik.enable=false"
      - "coolify.managed=true"

  # --- Prometheus TSDB, scrapes node_exporter (host) + cadvisor ---
  prometheus:
    build: ./prometheus
    image: status-prometheus:v2
    container_name: status-prometheus
    restart: unless-stopped
    user: "65534:65534"  # nobody
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=500MB
      - --web.listen-address=0.0.0.0:9090
      - --web.enable-lifecycle
    volumes:
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=false"
      - "coolify.managed=true"

  # --- Status page (public, behind Traefik) ---
  status:
    build: .
    image: server-status-page:v2
    container_name: status-page
    restart: unless-stopped
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - DOCKER_API_URL=http://dockerproxy:2375
      - N8N_URL=https://n8nmdobner.duckdns.org
      - FAIL2BAN_JSON=/host/status/fail2ban.json
      - TOP_JSON=/host/status/top.json
      - UPDATE_INTERVAL=30
    volumes:
      - /var/lib/status:/host/status:ro
    depends_on:
      prometheus:
        condition: service_healthy
      dockerproxy:
        condition: service_started
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.statusv2-http.rule=Host(`statusmdobner.duckdns.org`)"
      - "traefik.http.routers.statusv2-http.entrypoints=http"
      - "traefik.http.routers.statusv2-http.middlewares=statusv2-https-redirect"
      - "traefik.http.middlewares.statusv2-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.statusv2-https-redirect.redirectscheme.permanent=true"
      # HTTPS with Let's Encrypt
      - "traefik.http.routers.statusv2-https.rule=Host(`statusmdobner.duckdns.org`)"
      - "traefik.http.routers.statusv2-https.entrypoints=https"
      - "traefik.http.routers.statusv2-https.tls=true"
      - "traefik.http.routers.statusv2-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.statusv2-https.service=statusv2-svc"
      - "traefik.http.services.statusv2-svc.loadbalancer.server.port=8000"
      - "coolify.managed=true"

volumes:
  prometheus_data:
