services:

  # --- Per-container metrics (CPU/RAM) ---
  # cadvisor mounts the docker socket read-only. Trust surface: the
  # status-page container (public) does NOT touch the socket — only
  # cadvisor (internal) does, and it only exposes read-only metrics.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: status-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose:
      - "8080"
    labels:
      - "traefik.enable=false"
      - "coolify.managed=true"

  # --- Prometheus TSDB, scrapes node_exporter (host) + cadvisor ---
  prometheus:
    build: ./prometheus
    image: status-prometheus:v2
    container_name: status-prometheus
    restart: unless-stopped
    user: "65534:65534"  # nobody
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=500MB
      - --web.listen-address=0.0.0.0:9090
      - --web.enable-lifecycle
    volumes:
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=false"
      - "coolify.managed=true"

  # --- Status page (public, behind Traefik) ---
  status:
    build: .
    image: server-status-page:v2
    container_name: status-page
    restart: unless-stopped
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - N8N_URL=https://n8nmdobner.duckdns.org
      - FAIL2BAN_JSON=/host/status/fail2ban.json
      - TOP_JSON=/host/status/top.json
      - UPDATE_INTERVAL=30
    volumes:
      - /var/lib/status:/host/status:ro
    depends_on:
      prometheus:
        condition: service_healthy
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.statusv2-http.rule=Host(`statusmdobner.duckdns.org`)"
      - "traefik.http.routers.statusv2-http.entrypoints=http"
      - "traefik.http.routers.statusv2-http.middlewares=statusv2-https-redirect"
      - "traefik.http.middlewares.statusv2-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.statusv2-https-redirect.redirectscheme.permanent=true"
      # HTTPS with Let's Encrypt
      - "traefik.http.routers.statusv2-https.rule=Host(`statusmdobner.duckdns.org`)"
      - "traefik.http.routers.statusv2-https.entrypoints=https"
      - "traefik.http.routers.statusv2-https.tls=true"
      - "traefik.http.routers.statusv2-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.statusv2-https.service=statusv2-svc"
      - "traefik.http.services.statusv2-svc.loadbalancer.server.port=8000"
      - "coolify.managed=true"

volumes:
  prometheus_data:
