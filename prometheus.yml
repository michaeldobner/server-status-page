global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    instance: statusmdobner

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
          - host.docker.internal:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
